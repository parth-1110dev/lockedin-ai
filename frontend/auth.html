<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>LockedIn — Auth</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      /* Auth page specific styles (keeps visual language consistent) */
      .auth-hero {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 20px;
      }

      .auth-card {
        width: 100%;
        max-width: 440px;
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 14px;
        padding: 28px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.55);
        backdrop-filter: blur(12px) saturate(120%);
      }

      .auth-home-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 30;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        pointer-events: auto;
        justify-content: center;
        white-space: nowrap;
      }

      .auth-home-circle {
        width: 34px;
        height: 34px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(193, 18, 31, 0.18);
        border: 1px solid rgba(255, 77, 109, 0.35);
        box-shadow: 0 0 0 4px rgba(255, 77, 109, 0.06);
        color: rgba(255, 77, 109, 0.95);
      }

      .auth-home-icon {
        width: 16px;
        height: 16px;
      }

      .auth-home-text {
        font-weight: 900;
      }

      @media (max-width: 520px) {
        .auth-home-btn {
          top: 14px;
          left: 14px;
        }
      }

      .auth-title {
        font-size: 20px;
        font-weight: 800;
        margin: 0 0 6px;
      }

      .auth-sub {
        margin: 0 0 18px;
        color: var(--text-secondary);
        font-size: 13px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
        background: transparent;
      }

      .tab-btn {
        flex: 1;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        background: rgba(255,255,255,0.02);
        color: var(--text);
        font-weight: 700;
        cursor: pointer;
        transition: all 150ms ease;
      }

      .tab-btn.is-active {
        background: linear-gradient(180deg, rgba(255,77,109,0.95), var(--red));
        color: var(--base);
        transform: translateY(-2px);
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 12px;
      }

      .input {
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.02);
        color: var(--text);
        outline: none;
        transition: box-shadow 150ms ease, border-color 150ms ease;
      }

      .input:focus {
        border-color: rgba(255,77,109,0.6);
        box-shadow: 0 18px 60px rgba(255,77,109,0.06);
      }

      .password-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        margin-top: -2px;
        color: var(--text-secondary);
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }

      .password-toggle input {
        accent-color: var(--accent);
        margin: 0;
      }

      .auth-actions {
        margin-top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
      }

      .muted {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .helper {
        margin-top: 12px;
        font-size: 13px;
        color: var(--text-secondary);
        text-align: center;
      }

      .error {
        color: #ff808f;
        font-size: 13px;
        margin-top: 8px;
        min-height: 18px;
      }
    </style>
  </head>
  <body>
    <div class="aurora" aria-hidden="true"></div>

    <button class="btn btn-outline auth-home-btn" type="button" aria-label="Go to homepage" title="Home" onclick="window.location.href='index.html'">
      <span class="auth-home-circle" aria-hidden="true">
        <svg class="auth-home-icon" width="16" height="16" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M11.5 4.5L6 10L11.5 15.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </span>
      <span class="auth-home-text">Home</span>
    </button>

    <main class="auth-hero">
      <div class="auth-card" role="region" aria-label="Authentication">
        <h1 class="auth-title">Welcome to LockedIn</h1>
        <p class="auth-sub">Sign in to continue to your sessions and knowledge packs.</p>

        <div class="tabs" role="tablist" aria-label="Auth tabs">
          <button id="tabLogin" class="tab-btn is-active" role="tab" aria-selected="true">Login</button>
          <button id="tabSignup" class="tab-btn" role="tab" aria-selected="false">Signup</button>
        </div>

        <form id="authForm" autocomplete="on">
          <div class="field">
            <label class="muted" for="email">Email</label>
            <input id="email" class="input" type="email" name="email" required autocomplete="email" />
            <div class="error" id="emailError" aria-live="polite"></div>
          </div>

          <div class="field">
            <label class="muted" for="password">Password</label>
            <input id="password" class="input" type="password" name="password" required autocomplete="current-password" />
            <label class="password-toggle" for="showPasswordToggle">
              <input id="showPasswordToggle" type="checkbox" />
              <span>Show Password</span>
            </label>
            <div class="error" id="passwordError" aria-live="polite"></div>
          </div>

          <div class="error" id="authError" aria-live="polite"></div>

          <div class="auth-actions">
            <div class="muted" id="authModeText">Logging in</div>
            <button id="submitBtn" class="btn btn-primary" type="submit">Login</button>
          </div>
        </form>

        <p class="helper" id="helperText">
          Don't have an account?
          <button id="toggleSmall" class="tab-btn" type="button" style="padding:6px 8px;border-radius:6px;">Signup</button>
        </p>
      </div>
    </main>

    <script src="./plan-state.js"></script>
    <script type="module">
      import supabase from './supabase.js'
      import { syncSupabaseUserRecord } from './auth.js'

      const tabLogin = document.getElementById('tabLogin')
      const tabSignup = document.getElementById('tabSignup')
      const toggleSmall = document.getElementById('toggleSmall')
      const submitBtn = document.getElementById('submitBtn')
      const passwordEl = document.getElementById('password')
      const showPasswordToggle = document.getElementById('showPasswordToggle')
      const authModeText = document.getElementById('authModeText')
      const authError = document.getElementById('authError')
      const authForm = document.getElementById('authForm')

      let isLoginMode = true

      const helperText = document.getElementById('helperText')

      function setMode(nextIsLoginMode) {
        isLoginMode = Boolean(nextIsLoginMode)
        tabLogin.classList.toggle('is-active', isLoginMode)
        tabLogin.setAttribute('aria-selected', isLoginMode ? 'true' : 'false')
        tabSignup.classList.toggle('is-active', !isLoginMode)
        tabSignup.setAttribute('aria-selected', !isLoginMode ? 'true' : 'false')
        submitBtn.textContent = isLoginMode ? 'Login' : 'Create account'
        authModeText.textContent = isLoginMode ? 'Logging in' : 'Signing up'
        if (helperText) {
          helperText.innerHTML = isLoginMode
            ? 'Don\'t have an account? <button id="toggleSmall" class="tab-btn" type="button" style="padding:6px 8px;border-radius:6px;">Signup</button>'
            : 'Already have an account? <button id="toggleSmall" class="tab-btn" type="button" style="padding:6px 8px;border-radius:6px;">Login</button>'
        }
        const nextToggleSmall = document.getElementById('toggleSmall')
        if (nextToggleSmall) {
          nextToggleSmall.addEventListener('click', () => setMode(!isLoginMode))
        }
        authError.textContent = ''
      }

      tabLogin.addEventListener('click', () => setMode(true))
      tabSignup.addEventListener('click', () => setMode(false))
      toggleSmall.addEventListener('click', () => setMode(!isLoginMode))

      if (showPasswordToggle && passwordEl) {
        showPasswordToggle.addEventListener('change', () => {
          passwordEl.type = showPasswordToggle.checked ? 'text' : 'password'
        })
      }

      function setFieldError(field, msg) {
        // field: 'general' | 'password' | 'email'
        const p = document.getElementById('passwordError')
        const e = document.getElementById('emailError')

        if (field === 'password') {
          if (p) p.textContent = msg || ''
          if (e) e.textContent = ''
          authError.textContent = ''
        } else if (field === 'email') {
          if (e) e.textContent = msg || ''
          if (p) p.textContent = ''
          authError.textContent = ''
        } else {
          // general error
          authError.textContent = msg || ''
          if (p) p.textContent = ''
          if (e) e.textContent = ''
        }
      }

      function getReturnTo() {
        const params = new URLSearchParams(window.location.search)
        const r = params.get('returnTo')
        try { return r ? decodeURIComponent(r) : 'index.html' } catch { return 'index.html' }
      }

      async function fetchAndStorePlanForUser(userId) {
        if (!userId) return
        try {
          const { data } = await supabase.from('users').select('plan').eq('id', userId).maybeSingle()
          const plan = String((data && data.plan) || 'free').trim().toLowerCase()
          const normalizedPlan = plan === 'pro' || plan === 'elite' || plan === 'free' ? plan : 'free'
          if (window.LockedInPlanState && typeof window.LockedInPlanState.setPlan === 'function') {
            window.LockedInPlanState.setPlan(normalizedPlan, { source: 'auth_html', userId })
          } else {
            window.currentUserPlan = normalizedPlan
            window.dispatchEvent(new CustomEvent('userPlanUpdated', { detail: { plan: normalizedPlan, source: 'auth_html', userId } }))
          }
        } catch (_) {}
      }

      authForm.addEventListener('submit', async (e) => {
        e.preventDefault()
        setFieldError('general', '')
        setFieldError('password', '')
        submitBtn.disabled = true

        const emailEl = document.getElementById('email')
        const email = (emailEl.value || '').trim()
        const password = passwordEl.value || ''

        if (!email) {
          setFieldError('email', 'Email is required')
          submitBtn.disabled = false
          return
        }

        // simple email format check
        const emailValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)
        if (!emailValid) {
          setFieldError('email', 'Please enter a valid email address')
          submitBtn.disabled = false
          return
        }

        if (!password) {
          setFieldError('password', 'Password is required')
          submitBtn.disabled = false
          return
        }

        if (password.length < 6) {
          setFieldError('password', 'Password must be at least 6 characters')
          submitBtn.disabled = false
          return
        }

        try {
          if (isLoginMode) {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password })
            if (error) {
              const msg = error.message || 'Login failed'
              // Show password-specific errors when appropriate
              if (/password|credentials|invalid/i.test(msg)) {
                setFieldError('password', msg)
              } else {
                setFieldError('general', msg)
              }
              submitBtn.disabled = false
              return
            }

            const userId = data?.user?.id || (await supabase.auth.getUser()).data?.user?.id
            await syncSupabaseUserRecord(data?.user || null, 'auth_html_login')
            await fetchAndStorePlanForUser(userId)
            window.location.href = getReturnTo()
            return
          }

          // signup flow
          const { data, error } = await supabase.auth.signUp({ email, password })
          if (error) {
            const msg = error.message || 'Signup failed'
            if (/password/i.test(msg)) setFieldError('password', msg)
            else setFieldError('general', msg)
            submitBtn.disabled = false
            return
          }

          let user = data?.user || null
          if (!user) {
            const u = await supabase.auth.getUser()
            user = u?.data?.user || null
          }

          // Sync users row to the authenticated auth user id
          if (user && user.id) {
            try {
              await syncSupabaseUserRecord(user, 'auth_html_signup')
            } catch (_) {
              // ignore duplicate key / race after attempting sync helper
            }

            await fetchAndStorePlanForUser(user.id)
          }

          // After signup redirect to returnTo
          window.location.href = getReturnTo()
        } catch (err) {
          const msg = err?.message || 'Unexpected error'
          // Default to general error unless it's clearly a password issue
          if (/password/i.test(msg)) setFieldError('password', msg)
          else setFieldError('general', msg)
          submitBtn.disabled = false
        }
      })

      // initialize
      setMode(true)
    </script>
  </body>
</html>
