<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>LockedIn - Session</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./session.css" />
  </head>

  <body>
    <div class="aurora" aria-hidden="true"></div>
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-left" aria-hidden="true"></div>
        <div class="topbar-timer" aria-live="polite">
          <span id="timerDisplay" class="timer-display">00:00</span>
        </div>
        <div class="topbar-right">
          <button id="exitBtn" class="exit-btn" type="button" aria-label="Exit session">
            Exit
          </button>
        </div>
      </div>
    </header>

    <main class="session-main">
      <section id="sessionScreen" class="screen">
        <div class="content-wrapper">
          <div class="content-card">
            <div id="motivation" class="motivation" aria-live="polite">
              <span id="motivationText">You're doing great</span>
            </div>

            <div class="topic-pill">
              Topic:
              <span id="topicDisplay" class="topic-value">—</span>
            </div>

            <article class="ai-output" aria-label="AI instructor output">
              <div id="session-content" class="session-content"></div>
            </article>
          </div>
        </div>
      </section>

      <section id="completeScreen" class="screen screen-complete" hidden>
        <button id="homeBtn" class="btn btn-outline complete-home-btn" type="button" aria-label="Go to homepage" title="Home">
          <span class="complete-home-circle" aria-hidden="true">
            <svg
              class="complete-home-icon"
              width="16"
              height="16"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M11.5 4.5L6 10L11.5 15.5"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="complete-home-text">Home</span>
        </button>
        <div class="complete-card">
          <h1 class="complete-title">Session Complete 🎯</h1>

          <div class="rating-block" aria-label="Session rating">
            <div class="rating-stars" role="radiogroup" aria-label="Select a rating from 1 to 5">
              <button class="star-btn" type="button" data-value="1" aria-label="Rate 1 star">★</button>
              <button class="star-btn" type="button" data-value="2" aria-label="Rate 2 stars">★</button>
              <button class="star-btn" type="button" data-value="3" aria-label="Rate 3 stars">★</button>
              <button class="star-btn" type="button" data-value="4" aria-label="Rate 4 stars">★</button>
              <button class="star-btn" type="button" data-value="5" aria-label="Rate 5 stars">★</button>
            </div>
          </div>

          <label for="feedbackBox" class="feedback-label">Optional feedback</label>
          <textarea
            id="feedbackBox"
            class="feedback-box"
            rows="4"
            placeholder="What helped you stay focused?"
          ></textarea>

          <div class="complete-actions">
            <button id="startNewBtn" class="btn btn-primary" type="button">
              Start New Session
            </button>
            <button id="continueBtn" class="btn btn-outline" type="button">
              Continue Learning
            </button>
          </div>

          <section class="knowledge-pack-section" aria-label="Generate knowledge pack">
            <hr class="divider" />
            <h2 class="knowledge-pack-title">Generate Your Knowledge Pack 📦</h2>
            <p class="knowledge-pack-description">
              Turn this session into structured notes, revision sheets & tests.
            </p>
            <button id="generateNotesBtn" class="btn btn-primary knowledge-pack-btn" type="button">
              Generate Notes
            </button>
          </section>
        </div>
      </section>
    </main>

    <script src="./session.js"></script>
  </body>
</html>
